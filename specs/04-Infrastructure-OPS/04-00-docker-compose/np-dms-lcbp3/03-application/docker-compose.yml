# File: specs/04-Infrastructure-OPS/04-00-docker-compose/np-dms-lcbp3/03-application/docker-compose.yml
# DMS Container v1.9.x — Layer 3: Application (DMS Backend + Frontend + ClamAV)
# Host: np-dms-lcbp3 (192.168.10.11)
# Change Log:
# - 2026-06-23: Initial creation — Server consolidation (ADR-041)
#   Migrated from QNAP: app/docker-compose-app.yml
#   Changes:
#     - volume paths → /opt/np-dms/ (local SSD)
#     - uploads → CIFS mount from ASUSTOR (Primary NAS — ADR-041 D2)
#     - OCR_API_URL → http://ocr-sidecar:8765 (Docker internal — ADR-040 D5)
#     - OLLAMA via host IP (native systemd service — D11, ไม่ใช่ Docker)
#     - QDRANT_HOST → qdrant (Docker internal)
#     - CLAMAV_HOST → clamav (Docker internal)
# ============================================================
# 🔒 SECURITY (ADR-016, Tier-1):
#   - backend: expose 192.168.10.11:3000 → NPM proxy (backend.np-dms.work)
#   - frontend: expose 192.168.10.11:3001 → NPM proxy (lcbp3.np-dms.work)
#   - clamav: internal only (no host port)
#   - JWT_SECRET ≠ AUTH_SECRET (enforced)
# ============================================================

x-restart: &restart_policy
  restart: unless-stopped

x-logging: &default_logging
  logging:
    driver: 'json-file'
    options:
      max-size: '10m'
      max-file: '5'

name: lcbp3-app

networks:
  lcbp3:
    external: true

services:
  # ----------------------------------------------------------------
  # 1. ClamAV — Antivirus scanning for file uploads (ADR-016)
  # Internal only — backend เรียกผ่าน DNS 'clamav:3310'
  # ----------------------------------------------------------------
  clamav:
    <<: [*restart_policy, *default_logging]
    image: clamav/clamav:1.4.4
    container_name: clamav
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 1G
    environment:
      CLAMAV_NO_LOG_FILE: 'true'
      FRESHCLAM_NO_LOG_FILE: 'true'
      TZ: 'Asia/Bangkok'
      CLAMAV_NO_FRESHCLAMD: 'false'
      CLAMAV_NO_CLAMD: 'false'
      CLAMD_STARTUP_TIMEOUT: '1800'
    networks:
      - lcbp3
    volumes:
      - '/opt/np-dms/clamav/data:/var/lib/clamav'
      - '/opt/np-dms/logs/clamav:/var/log/clamav'
    healthcheck:
      test: ['CMD', 'clamdcheck.sh']
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 300s

  # ----------------------------------------------------------------
  # 2. Backend API (NestJS)
  # Expose: 192.168.10.11:3000 → NPM proxy (backend.np-dms.work)
  # DB: MariaDB (Docker internal 'mariadb:3306')
  # Redis: Docker internal 'cache:6379'
  # ES: Docker internal 'search:9200'
  # Qdrant: Docker internal 'qdrant:6333'
  # ClamAV: Docker internal 'clamav:3310'
  # OCR: Docker internal 'ocr-sidecar:8765' (ADR-040 D5)
  # Ollama: native systemd service on host (D11) — http://192.168.10.11:11434
  # ----------------------------------------------------------------
  backend:
    <<: [*restart_policy, *default_logging]
    image: lcbp3-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: backend
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1536M
        reservations:
          cpus: '0.5'
          memory: 512M
    env_file:
      - ../.env
    environment:
      TZ: 'Asia/Bangkok'
      NODE_ENV: 'production'
      # --- Database ---
      DB_HOST: 'mariadb'
      DB_PORT: '3306'
      DB_DATABASE: 'lcbp3'
      DB_USERNAME: 'center'
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      # --- Redis ---
      REDIS_HOST: 'cache'
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      # --- Elasticsearch ---
      ELASTICSEARCH_HOST: 'search'
      ELASTICSEARCH_PORT: '9200'
      ELASTICSEARCH_USERNAME: ${ELASTICSEARCH_USERNAME:-elastic}
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD:?ELASTICSEARCH_PASSWORD required}
      # --- CORS (frontend origin) ---
      CORS_ORIGIN: ${CORS_ORIGIN:-https://lcbp3.np-dms.work,http://192.168.10.11:3001}
      # --- JWT (backend only) ---
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      JWT_EXPIRATION: '8h'
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET required}
      # --- ClamAV (ADR-016 file upload scan) ---
      CLAMAV_HOST: 'clamav'
      CLAMAV_PORT: '3310'
      # --- Qdrant (Vector Database for RAG — ADR-023A) ---
      QDRANT_HOST: 'qdrant'
      QDRANT_PORT: '6333'
      QDRANT_URL: 'http://qdrant:6333'
      # --- OCR Sidecar (Docker internal — ADR-040 D5) ---
      OCR_API_URL: 'http://ocr-sidecar:8765'
      OCR_CHAR_THRESHOLD: ${OCR_CHAR_THRESHOLD:-100}
      OCR_SIDECAR_UPLOAD_BASE: ${OCR_SIDECAR_UPLOAD_BASE:-/mnt/uploads}
      OCR_SIDECAR_API_KEY: ${OCR_SIDECAR_API_KEY:?OCR_SIDECAR_API_KEY required}
      # --- Ollama (native systemd — D11, ไม่ใช่ Docker internal) ---
      OLLAMA_URL: 'http://192.168.10.11:11434'
      # --- Numbering ---
      NUMBERING_LOCK_TIMEOUT: '5000'
      NUMBERING_RESERVATION_TTL: '300'
      # --- File Upload ---
      UPLOAD_TEMP_DIR: '/app/uploads/temp'
      UPLOAD_PERMANENT_DIR: '/app/uploads/permanent'
      PORT: '3000'
      MAX_FILE_SIZE: '52428800'
    networks:
      - lcbp3
    ports:
      - '0.0.0.0:3000:3000'
    volumes:
      # ASUSTOR CIFS — uploads (Primary NAS — ADR-041 D2)
      - '/mnt/asustor-uploads/temp:/app/uploads/temp'
      - '/mnt/asustor-uploads/permanent:/app/uploads/permanent'
      - '/opt/np-dms/logs/backend:/app/logs'
      # ASUSTOR CIFS — Legacy staging (read-only)
      - '/mnt/asustor-legacy:/home/node/.n8n-files/staging_ai:ro'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      clamav:
        condition: service_healthy

  # ----------------------------------------------------------------
  # 3. Frontend Web App (Next.js)
  # Expose: 192.168.10.11:3001 → NPM proxy (lcbp3.np-dms.work)
  # Internal API: http://backend:3000/api (Docker internal)
  # ----------------------------------------------------------------
  frontend:
    <<: [*restart_policy, *default_logging]
    image: lcbp3-frontend:${FRONTEND_IMAGE_TAG:-latest}
    container_name: frontend
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    env_file:
      - ../.env
    environment:
      TZ: 'Asia/Bangkok'
      NODE_ENV: 'production'
      HOSTNAME: '0.0.0.0'
      PORT: '3000'
      NEXT_PUBLIC_API_URL: 'https://lcbp3.np-dms.work/api'
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET required}
      AUTH_URL: 'https://lcbp3.np-dms.work'
      AUTH_TRUST_HOST: 'true'
      INTERNAL_API_URL: 'http://backend:3000/api'
    networks:
      - lcbp3
    ports:
      - '0.0.0.0:3001:3000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      backend:
        condition: service_healthy
