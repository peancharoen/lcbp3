# File: specs/04-Infrastructure-OPS/04-00-docker-compose/np-dms-lcbp3/04-ai/docker-compose.yml
# DMS Container v1.9.x — Layer 4: AI Services (GPU)
# Host: np-dms-lcbp3 (192.168.10.11)
# Change Log:
# - 2026-06-23: Initial creation — Server consolidation (ADR-041)
#   Migrated from Desk-5439: ocr-sidecar/ + Ollama (host service)
#   Changes:
#     - Ollama: containerized (was host-native on Desk-5439)
#     - OLLAMA_API_URL → http://ollama:11434 (Docker internal — ADR-041 D1)
#     - OCR sidecar: OLLAMA_API_URL → http://ollama:11434 (Docker internal)
#     - ollama-metrics: expose 192.168.10.11:9924 (for ASUSTOR Prometheus)
# ============================================================
# 🔒 SECURITY (ADR-016, ADR-023, ADR-040, ADR-041):
#   - Ollama: internal only (no host port) — Docker-internal isolation (ADR-041 D1)
#   - OCR Sidecar: internal only (no host port) — network-only auth (ADR-040 D5)
#   - ollama-metrics: expose 192.168.10.11:9924 (Prometheus scrape from ASUSTOR)
#   - GPU access via nvidia-container-toolkit
# ============================================================
# 📌 GPU VRAM Management (ADR-041 D4, ADR-040 D3/D4):
#   - np-dms-ai (Main LLM) ~6-8GB VRAM
#   - np-dms-ocr (OCR) ~5GB VRAM
#   - nomic-embed-text ~0.5GB VRAM
#   - Adaptive Residency: LLM-First ownership, CPU fallback for BGE/Reranker
# ============================================================

x-restart: &restart_policy
  restart: unless-stopped

x-logging: &default_logging
  logging:
    driver: 'json-file'
    options:
      max-size: '10m'
      max-file: '3'

name: lcbp3-ai

networks:
  lcbp3:
    external: true

services:
  # ----------------------------------------------------------------
  # 1. Ollama — LLM + Embedding Engine (ADR-034)
  # Models: np-dms-ai:latest (Main), np-dms-ocr:latest (OCR), nomic-embed-text
  # Internal only — services access via DNS 'ollama:11434'
  # GPU: RTX 5060 Ti 16GB (nvidia-container-toolkit)
  # ----------------------------------------------------------------
  ollama:
    <<: [*restart_policy, *default_logging]
    image: ollama/ollama:latest
    container_name: ollama
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      TZ: 'Asia/Bangkok'
      # OLLAMA_KEEP_ALIVE: -1 = เก็บ model ใน VRAM ตลอด (adaptive residency จัดการโดย sidecar)
      OLLAMA_KEEP_ALIVE: '-1'
      # GPU memory fraction — ป้องกัน OOM (ADR-041 D4)
      OLLAMA_GPU_MEMORY_FRACTION: '0.9'
    networks:
      - lcbp3
    expose:
      - '11434'
    volumes:
      - '/opt/np-dms/ollama/models:/root/.ollama'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:11434/api/tags || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ----------------------------------------------------------------
  # 2. OCR Sidecar — FastAPI OCR Worker (ADR-040)
  # Internal only — backend เรียกผ่าน DNS 'ocr-sidecar:8765'
  # Ollama: Docker internal 'ollama:11434' (ADR-040 D5 — network-only auth)
  # ----------------------------------------------------------------
  ocr-sidecar:
    <<: [*restart_policy, *default_logging]
    build:
      context: ./ocr-sidecar
      dockerfile: Dockerfile
    container_name: ocr-sidecar
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    environment:
      OCR_CHAR_THRESHOLD: '100'
      OCR_PORT: '8765'
      OCR_MAX_PAGES: '0'
      # Security (ADR-040 Phase 1)
      OCR_SIDECAR_API_KEY: ${OCR_SIDECAR_API_KEY:?OCR_SIDECAR_API_KEY required}
      # Adaptive OCR Residency (ADR-040 Phase 4)
      OCR_ACTIVE_PROFILE: ${OCR_ACTIVE_PROFILE:-}
      # OCR via Ollama (Docker internal — ADR-041 D1)
      OLLAMA_API_URL: 'http://ollama:11434'
      OCR_MODEL: 'np-dms-ocr:latest'
      OCR_TIMEOUT: '360'
      # VRAM, Residency & Timeout (Feature-235)
      VRAM_HEADROOM_THRESHOLD_MB: '3000.0'
      OCR_RESIDENCY_WINDOW_SECONDS: '120'
      GPU_TOTAL_VRAM_MB: '16384.0'
      GPU_MAIN_MODEL_PRESSURE_THRESHOLD_MB: '12000.0'
      RETRIEVAL_TIMEOUT_SECONDS: '30.0'
    networks:
      - lcbp3
    expose:
      - '8765'
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8765/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ----------------------------------------------------------------
  # 3. Ollama Metrics — Prometheus Sidecar (ADR-041)
  # Expose: 192.168.10.11:9924 (Prometheus scrape from ASUSTOR 192.168.10.9)
  # ----------------------------------------------------------------
  ollama-metrics:
    <<: [*restart_policy, *default_logging]
    image: ghcr.io/norskhelsenett/ollama-metrics:latest
    container_name: ollama-metrics
    environment:
      # Ollama ผ่าน Docker internal DNS
      OLLAMA_HOST: 'http://ollama:11434'
      PORT: '9924'
    ports:
      - '192.168.10.11:9924:9924'
    networks:
      - lcbp3
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:9924/metrics']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
