# File: specs/04-Infrastructure-OPS/04-00-docker-compose/np-dms-lcbp3/04-ai/docker-compose.yml
# DMS Container v1.9.x — Layer 4: AI Telemetry (Ollama + GPU Exporters)
# Host: np-dms-lcbp3 (192.168.10.11) — ADR-041 consolidated server
# Change Log:
# - 2026-07-17: Initial creation — แยก ollama-metrics + nvidia-gpu-exporter
#   ออกจาก ocr-sidecar/docker-compose.yml เพื่อความชัดเจนทางสถาปัตยกรรม
#   (telemetry ไม่ใช่ส่วนของ OCR workload)
#
# บริการในไฟล์นี้:
#   ollama-metrics      — Prometheus sidecar สำหรับ Ollama (NorskHelsenett)
#   nvidia-gpu-exporter — GPU-level telemetry ผ่าน nvidia-smi (utkuozdemir)
#
# ข้อกำหนด:
#   - Ollama รันเป็น native systemd service บน host (D11, ADR-034/ADR-041)
#   - NVIDIA Container Toolkit ต้องติดตั้งบน host (สำหรับ nvidia-gpu-exporter)
#   - ทั้งสองใช้ host.docker.internal:host-gateway เข้าถึง Ollama บน host
#
# วิธีรัน:
#   docker compose --env-file ../.env up -d
#
# ทดสอบ:
#   curl http://192.168.10.11:9924/metrics   (ollama-metrics)
#   curl http://192.168.10.11:9835/metrics   (nvidia-gpu-exporter)

x-restart: &restart_policy
  restart: unless-stopped

x-logging: &default_logging
  logging:
    driver: 'json-file'
    options:
      max-size: '10m'
      max-file: '3'

name: lcbp3-ai-telemetry

networks:
  lcbp3:
    external: true

services:
  # ----------------------------------------------------------------
  # 1. ollama-metrics (NorskHelsenett) — Prometheus Sidecar สำหรับ Ollama
  # ----------------------------------------------------------------
  # Transparent proxy ที่นั่งระหว่าง client กับ Ollama (port 11434)
  # เก็บ metrics แล้ว expose ที่ /metrics บน port 9924 (Prometheus format)
  #
  # Metrics ที่ได้:
  #   ollama_prompt_tokens_total       — จำนวน prompt tokens ทั้งหมด
  #   ollama_generated_tokens_total    — จำนวน generated tokens ทั้งหมด
  #   ollama_request_duration_seconds  — ระยะเวลา request (histogram)
  #   ollama_time_per_token_seconds    — เวลาต่อ token (inference speed)
  #   ollama_loaded_models             — จำนวน model ที่โหลดอยู่ใน VRAM
  #   ollama_model_loaded              — indicator 1/0 ต่อ model
  #   ollama_model_ram_mb              — VRAM usage (MB) ต่อ model
  #
  # Prometheus (ASUSTOR 192.168.10.9) scrape จาก:
  #   http://192.168.10.11:9924/metrics
  ollama-metrics:
    <<: [*restart_policy, *default_logging]
    image: ghcr.io/norskhelsenett/ollama-metrics:latest
    container_name: ollama-metrics
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    environment:
      # ชี้ไปที่ Ollama ที่รันเป็น native systemd service บน host (D11)
      # host.docker.internal → host gateway → systemd Ollama on port 11434
      OLLAMA_HOST: "http://host.docker.internal:11434"
      PORT: "9924"
    ports:
      - "192.168.10.11:9924:9924"
    networks:
      - lcbp3
    extra_hosts:
      # Linux: map host.docker.internal → host gateway
      # จำเป็นสำหรับ Ollama ที่รันเป็น native systemd service บน host (D11)
      - "host.docker.internal:host-gateway"
    # Distroless image (เฉพาะ binary /main) — ไม่มี shell/wget/curl
    # ใช้ Prometheus scraping :9924/metrics เป็น external monitoring แทน healthcheck
    healthcheck:
      disable: true

  # ----------------------------------------------------------------
  # 2. nvidia-gpu-exporter (utkuozdemir) — GPU-level telemetry ผ่าน nvidia-smi
  # ----------------------------------------------------------------
  # เก็บ metrics ที่ ollama-metrics (NorskHelsenett) ไม่มี: temp, util%,
  # power draw, clock speed, fan — ระดับ GPU card ไม่ใช่ระดับ model
  #
  # Prometheus (ASUSTOR 192.168.10.9) scrape จาก:
  #   http://192.168.10.11:9835/metrics
  nvidia-gpu-exporter:
    <<: [*restart_policy, *default_logging]
    image: utkuozdemir/nvidia_gpu_exporter:1.4.1
    container_name: nvidia-gpu-exporter
    runtime: nvidia
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    environment:
      NVIDIA_VISIBLE_DEVICES: "all"
    ports:
      - "192.168.10.11:9835:9835"
    networks:
      - lcbp3
    # Minimal image (ไม่มี shell/wget) — ใช้ Prometheus scraping :9835/metrics
    # เป็น external monitoring แทน healthcheck (เหมือน ollama-metrics)
    healthcheck:
      disable: true
