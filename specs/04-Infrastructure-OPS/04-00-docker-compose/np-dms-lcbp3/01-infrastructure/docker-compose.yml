# File: specs/04-Infrastructure-OPS/04-00-docker-compose/np-dms-lcbp3/01-infrastructure/docker-compose.yml
# DMS Container v1.9.x — Layer 1: Infrastructure (Data Stores)
# Host: np-dms-lcbp3 (192.168.10.11)
# Change Log:
# - 2026-06-23: Initial creation — Server consolidation (ADR-041)
#   Migrated from QNAP split files: mariadb/ + service/ (cache, search, qdrant)
#   Changes: volume paths → /opt/np-dms/, MariaDB RAM 8G, ES heap 2G
# ============================================================
# 🔒 SECURITY (ADR-016, Tier-1):
#   - MariaDB: bind 192.168.10.11:3306 (internal + NPM on QNAP via VLAN 10)
#   - Redis: loopback only — services use DNS 'cache:6379'
#   - Elasticsearch: internal only (no host port)
#   - Qdrant: internal only (no host port)
#   - PMA: expose 192.168.10.11:8080 → NPM proxy (pma.np-dms.work)
#   - Portainer: expose 192.168.10.11:9443 → NPM proxy (portainer.np-dms.work)
# ============================================================

x-restart: &restart_policy
  restart: unless-stopped

x-logging: &default_logging
  logging:
    driver: 'json-file'
    options:
      max-size: '10m'
      max-file: '5'

name: lcbp3-infra

networks:
  lcbp3:
    external: true

services:
  # ----------------------------------------------------------------
  # 1. MariaDB — DMS + Gitea + NPM databases
  # Image: mariadb:11.8 (pinned — ADR-009)
  # RAM: 8G (reduced from 16G — DB ยังเล็ก ~10MB, อัปเกรดได้ภายหลัง)
  # ----------------------------------------------------------------
  mariadb:
    <<: [*restart_policy, *default_logging]
    image: mariadb:11.8
    container_name: mariadb
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '0.5'
          memory: 1G
    command: >-
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
    env_file:
      - ../.env
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD required}
      MARIADB_DATABASE: 'lcbp3'
      MARIADB_USER: 'center'
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      TZ: 'Asia/Bangkok'
    # bind เฉพาะ IP ของ New Server — NPM บน QNAP เข้าถึงผ่าน VLAN 10
    ports:
      - '192.168.10.11:3306:3306'
    networks:
      - lcbp3
    volumes:
      - '/data/mariadb:/var/lib/mysql'
      - '/opt/np-dms/mariadb/my.cnf:/etc/mysql/conf.d/my.cnf:ro'
      - '/opt/np-dms/mariadb/init:/docker-entrypoint-initdb.d:ro'
      - '/opt/np-dms/mariadb/backup:/backup'
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ----------------------------------------------------------------
  # 2. phpMyAdmin — DB management UI
  # Expose 192.168.10.11:8080 → NPM proxy (pma.np-dms.work)
  # ----------------------------------------------------------------
  pma:
    <<: [*restart_policy, *default_logging]
    image: phpmyadmin:5-apache
    container_name: pma
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    environment:
      TZ: 'Asia/Bangkok'
      PMA_HOST: 'mariadb'
      PMA_PORT: '3306'
      PMA_ABSOLUTE_URI: 'https://pma.np-dms.work/'
      UPLOAD_LIMIT: '1G'
      MEMORY_LIMIT: '512M'
    # expose ให้ NPM บน QNAP เข้าถึงผ่าน VLAN 10
    ports:
      - '192.168.10.11:8080:80'
    networks:
      - lcbp3
    volumes:
      - '/opt/np-dms/pma/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro'
      - '/opt/np-dms/pma/zzz-custom.ini:/usr/local/etc/php/conf.d/zzz-custom.ini:ro'
      - '/opt/np-dms/pma/tmp:/var/lib/phpmyadmin/tmp:rw'
      - '/opt/np-dms/logs/pma:/var/log/apache2'
    depends_on:
      mariadb:
        condition: service_healthy

  # ----------------------------------------------------------------
  # 3. Redis — Caching + Distributed Lock + BullMQ queues
  # Internal only (loopback bind for debug)
  # ----------------------------------------------------------------
  cache:
    <<: [*restart_policy, *default_logging]
    image: redis:7-alpine
    container_name: cache
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    environment:
      TZ: 'Asia/Bangkok'
    env_file:
      - ../.env
    command:
      - 'redis-server'
      - '--requirepass'
      - '${REDIS_PASSWORD:?REDIS_PASSWORD required}'
      - '--appendonly'
      - 'yes'
      - '--maxmemory-policy'
      - 'noeviction'
    ports:
      - '127.0.0.1:6379:6379'
    networks:
      - lcbp3
    volumes:
      - '/opt/np-dms/redis/data:/data'
    healthcheck:
      test:
        ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', '--no-auth-warning', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # 4. Elasticsearch — Advanced Search
  # Internal only (no host port — ADR-016)
  # Heap: 2G (ลดจาก 4G — RAM budget 32GB)
  # ----------------------------------------------------------------
  search:
    <<: [*restart_policy, *default_logging]
    image: elasticsearch:8.11.1
    container_name: search
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 2G
    env_file:
      - ../.env
    environment:
      TZ: 'Asia/Bangkok'
      discovery.type: 'single-node'
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: '-Xms2g -Xmx2g'
    ulimits:
      memlock:
        soft: -1
        hard: -1
    expose:
      - '9200'
    networks:
      - lcbp3
    volumes:
      - '/data/elasticsearch:/usr/share/elasticsearch/data'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -s http://localhost:9200/_cluster/health | grep -q ''"status":"green"\|"status":"yellow"''',
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ----------------------------------------------------------------
  # 5. Qdrant — Vector Database for RAG (ADR-023A)
  # Internal only (no host port)
  # ----------------------------------------------------------------
  qdrant:
    <<: [*restart_policy, *default_logging]
    image: qdrant/qdrant:v1.16.1
    container_name: qdrant
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    environment:
      TZ: 'Asia/Bangkok'
      QDRANT__SERVICE__GRPC_PORT: '6334'
      QDRANT__LOG_LEVEL: 'INFO'
    networks:
      - lcbp3
    expose:
      - '6333'
      - '6334'
    volumes:
      - '/data/qdrant:/qdrant/storage'
    healthcheck:
      test: ['CMD-SHELL', 'bash -c "exec 3<>/dev/tcp/localhost/6333 && echo -e \"GET /healthz HTTP/1.0\r\nHost: localhost\r\n\r\n\" >&3 && grep -q \"200 OK\" <&3"']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ----------------------------------------------------------------
  # 6. Portainer — Docker Management UI
  # Expose: 192.168.10.11:9443 → NPM proxy (portainer.np-dms.work)
  # ต้อง mount docker.sock เพื่อจัดการ containers ทุกตัว
  # ----------------------------------------------------------------
  portainer:
    <<: [*restart_policy, *default_logging]
    image: portainer/portainer-ce:latest
    container_name: portainer
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    environment:
      TZ: 'Asia/Bangkok'
    ports:
      - '192.168.10.11:9443:9443'
    networks:
      - lcbp3
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - 'portainer_data:/data'
    healthcheck:
      disable: true

volumes:
  portainer_data:
    driver: local
