# File: specs/04-Infrastructure-OPS/04-00-docker-compose/np-dms-lcbp3/01-infrastructure/docker-compose.yml
# DMS Container v1.9.x — Layer 1: Infrastructure (Data Stores)
# Host: np-dms-lcbp3 (192.168.10.11)
# Change Log:
# - 2026-06-23: Initial creation — Server consolidation (ADR-041)
#   Migrated from QNAP split files: mariadb/ + service/ (cache, search, qdrant)
#   Changes: volume paths → /opt/np-dms/, MariaDB RAM 8G, ES heap 2G
# - 2026-07-17: เพิ่ม node-exporter (9100), cadvisor (8088), mariadb-exporter (9104)
#   สำหรับ Prometheus scrape จาก ASUSTOR monitoring stack
# ============================================================
# 🔒 SECURITY (ADR-016, Tier-1):
#   - MariaDB: bind 192.168.10.11:3306 (internal + NPM on QNAP via VLAN 10)
#   - Redis: bind 192.168.10.11:6379 (Uptime Kuma @ ASUSTOR 192.168.10.9)
#   - Elasticsearch: bind 192.168.10.11:9200 (Uptime Kuma @ ASUSTOR 192.168.10.9)
#   - Qdrant: bind 192.168.10.11:6333 (Uptime Kuma @ ASUSTOR 192.168.10.9; gRPC 6334 internal only)
#   - PMA: expose 192.168.10.11:8080 → NPM proxy (pma.np-dms.work)
#   - Portainer: expose 192.168.10.11:9443 → NPM proxy (portainer.np-dms.work)
#   - node-exporter: bind 192.168.10.11:9100 (Prometheus scrape from ASUSTOR)
#   - cadvisor: bind 192.168.10.11:8088 (Prometheus scrape from ASUSTOR)
#   - mariadb-exporter: bind 192.168.10.11:9104 (Prometheus scrape from ASUSTOR)
# ============================================================

x-restart: &restart_policy
  restart: unless-stopped

x-logging: &default_logging
  logging:
    driver: 'json-file'
    options:
      max-size: '10m'
      max-file: '5'

name: lcbp3-infra

networks:
  lcbp3:
    external: true

services:
  # ----------------------------------------------------------------
  # 1. MariaDB — DMS + Gitea + NPM databases
  # Image: mariadb:11.8 (pinned — ADR-009)
  # RAM: 16G (RAM 64GB — ใช้ buffer pool เต็มที่)
  # ----------------------------------------------------------------
  mariadb:
    <<: [*restart_policy, *default_logging]
    image: mariadb:11.8
    container_name: mariadb
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G
        reservations:
          cpus: '0.5'
          memory: 2G
    command: >-
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
    env_file:
      - ../.env
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD required}
      MARIADB_DATABASE: 'lcbp3'
      MARIADB_USER: 'center'
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      TZ: 'Asia/Bangkok'
    # bind เฉพาะ IP ของ New Server — NPM บน QNAP เข้าถึงผ่าน VLAN 10
    ports:
      - '192.168.10.11:3306:3306'
    networks:
      - lcbp3
    volumes:
      - '/data/mariadb:/var/lib/mysql'
      - '/opt/np-dms/mariadb/my.cnf:/etc/mysql/conf.d/my.cnf:ro'
      - '/opt/np-dms/mariadb/init:/docker-entrypoint-initdb.d:ro'
      - '/opt/np-dms/mariadb/backup:/backup'
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ----------------------------------------------------------------
  # 2. phpMyAdmin — DB management UI
  # Expose 192.168.10.11:8080 → NPM proxy (pma.np-dms.work)
  # ----------------------------------------------------------------
  pma:
    <<: [*restart_policy, *default_logging]
    image: phpmyadmin:5-apache
    container_name: pma
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    environment:
      TZ: 'Asia/Bangkok'
      PMA_HOST: 'mariadb'
      PMA_PORT: '3306'
      UPLOAD_LIMIT: '1G'
      MEMORY_LIMIT: '512M'
    # expose ให้เข้าถึงผ่าน VLAN 10
    ports:
      - '192.168.10.11:8080:80'
    networks:
      - lcbp3
    volumes:
      - '/opt/np-dms/pma/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro'
      - '/opt/np-dms/pma/zzz-custom.ini:/usr/local/etc/php/conf.d/zzz-custom.ini:ro'
      - '/opt/np-dms/pma/tmp:/var/lib/phpmyadmin/tmp:rw'
      - '/opt/np-dms/logs/pma:/var/log/apache2'
    depends_on:
      mariadb:
        condition: service_healthy

  # ----------------------------------------------------------------
  # 3. Redis — Caching + Distributed Lock + BullMQ queues
  # Bind 192.168.10.11:6379 — Uptime Kuma @ ASUSTOR 192.168.10.9
  # ----------------------------------------------------------------
  cache:
    <<: [*restart_policy, *default_logging]
    image: redis:7-alpine
    container_name: cache
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 4G
        reservations:
          cpus: '0.25'
          memory: 1G
    environment:
      TZ: 'Asia/Bangkok'
    env_file:
      - ../.env
    command:
      - 'redis-server'
      - '--requirepass'
      - '${REDIS_PASSWORD:?REDIS_PASSWORD required}'
      - '--appendonly'
      - 'yes'
      - '--maxmemory-policy'
      - 'noeviction'
    ports:
      - '192.168.10.11:6379:6379'
    networks:
      - lcbp3
    volumes:
      - '/opt/np-dms/redis/data:/data'
    healthcheck:
      test:
        ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', '--no-auth-warning', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # 4. Elasticsearch — Advanced Search
  # Bind 192.168.10.11:9200 — Uptime Kuma @ ASUSTOR 192.168.10.9
  # Heap: 4G (RAM 64GB — คืนค่า heap ตามขนาดเดิม)
  # ----------------------------------------------------------------
  search:
    <<: [*restart_policy, *default_logging]
    image: elasticsearch:8.11.1
    container_name: search
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 6G
        reservations:
          cpus: '0.5'
          memory: 3G
    env_file:
      - ../.env
    environment:
      TZ: 'Asia/Bangkok'
      discovery.type: 'single-node'
      xpack.security.enabled: 'true'
      ELASTIC_PASSWORD: ${ELASTICSEARCH_PASSWORD:?ELASTICSEARCH_PASSWORD required}
      ES_JAVA_OPTS: '-Xms4g -Xmx4g'
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - '192.168.10.11:9200:9200'
    networks:
      - lcbp3
    volumes:
      - '/data/elasticsearch:/usr/share/elasticsearch/data'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -s -u elastic:"$$ELASTIC_PASSWORD" http://localhost:9200/_cluster/health | grep -q ''"status":"green"\|"status":"yellow"''',
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ----------------------------------------------------------------
  # 5. Qdrant — Vector Database for RAG (ADR-023A)
  # Bind 192.168.10.11:6333 — Uptime Kuma @ ASUSTOR 192.168.10.9
  # gRPC 6334 internal only (Docker network)
  # ----------------------------------------------------------------
  qdrant:
    <<: [*restart_policy, *default_logging]
    image: qdrant/qdrant:v1.16.1
    container_name: qdrant
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 4G
        reservations:
          cpus: '0.25'
          memory: 1G
    environment:
      TZ: 'Asia/Bangkok'
      QDRANT__SERVICE__GRPC_PORT: '6334'
      QDRANT__LOG_LEVEL: 'INFO'
    networks:
      - lcbp3
    ports:
      - '192.168.10.11:6333:6333'
    expose:
      - '6334'
    volumes:
      - '/data/qdrant:/qdrant/storage'
    healthcheck:
      test: ['CMD-SHELL', 'bash -c "exec 3<>/dev/tcp/localhost/6333 && echo -e \"GET /healthz HTTP/1.0\r\nHost: localhost\r\n\r\n\" >&3 && grep -q \"200 OK\" <&3"']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ----------------------------------------------------------------
  # 6. Portainer — Docker Management UI
  # Expose: 192.168.10.11:9443 → NPM proxy (portainer.np-dms.work)
  # ต้อง mount docker.sock เพื่อจัดการ containers ทุกตัว
  # ----------------------------------------------------------------
  portainer:
    <<: [*restart_policy, *default_logging]
    image: portainer/portainer-ce:latest
    container_name: portainer
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    environment:
      TZ: 'Asia/Bangkok'
    ports:
      - '192.168.10.11:9443:9443'
    networks:
      - lcbp3
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - 'portainer_data:/data'
    healthcheck:
      disable: true

  # ----------------------------------------------------------------
  # 7. Node Exporter — Host Metrics (Prometheus scrape target)
  # Bind: 192.168.10.11:9100 — Prometheus (ASUSTOR 192.168.10.9) scrape
  # Metrics: CPU, memory, disk, network, filesystem usage
  # ----------------------------------------------------------------
  node-exporter:
    <<: [*restart_policy, *default_logging]
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    environment:
      TZ: 'Asia/Bangkok'
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - '192.168.10.11:9100:9100'
    networks:
      - lcbp3
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:9100/metrics']
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------------
  # 8. cAdvisor — Container Metrics (Prometheus scrape target)
  # Bind: 192.168.10.11:8088 → container 8080
  # Metrics: per-container CPU, memory, network, filesystem
  # ----------------------------------------------------------------
  cadvisor:
    <<: [*restart_policy, *default_logging]
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: cadvisor
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    environment:
      TZ: 'Asia/Bangkok'
    ports:
      - '192.168.10.11:8088:8080'
    networks:
      - lcbp3
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8080/healthz']
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------------
  # 9. MariaDB Exporter — Database Metrics (Prometheus scrape target)
  # Bind: 192.168.10.11:9104 — Prometheus (ASUSTOR 192.168.10.9) scrape
  # Metrics: MariaDB performance, connections, queries, buffer pool
  # ----------------------------------------------------------------
  mariadb-exporter:
    <<: [*restart_policy, *default_logging]
    image: prom/mysqld-exporter:v0.15.1
    container_name: mariadb-exporter
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    environment:
      TZ: 'Asia/Bangkok'
    env_file:
      - ../.env
    command:
      - '--config.my-cnf=/etc/my.cnf'
    ports:
      - '192.168.10.11:9104:9104'
    networks:
      - lcbp3
    volumes:
      # Mount MariaDB config สำหรับ connection credentials
      - '/opt/np-dms/mariadb/exporter-my.cnf:/etc/my.cnf:ro'
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:9104/metrics']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  portainer_data:
    driver: local
